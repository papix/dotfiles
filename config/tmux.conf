########################################
# Status
########################################

set -g status on
set -g status 2
set -g status-position bottom
set -g status-interval 5

# ステータスラインを2行表示
# 1行目: window list
# 2行目: status-left/status-right（tmux-powerline）
set -g status-format[0] "#[list=on align=#{status-justify}]#{W:#{T:window-status-format},#{T:window-status-current-format}}"
set -g status-format[1] "#[align=left #{E:status-left-style}]#{T;=/#{status-left-length}:status-left}#[align=right #{E:status-right-style}]#{T;=/#{status-right-length}:status-right}"

# Solarized Dark status bar colors
set -g status-bg colour234
set -g status-fg colour250

# window list style options (used by tmux-powerline custom theme)
# bell/activity時は index+flags のみ強調し、window名は通常色を維持する
set -g @tp_window_idx_style 'fg=colour250,bg=colour235'
set -g @tp_window_idx_bell_style 'fg=colour166,bg=colour235,bold'
set -g @tp_window_idx_activity_style 'fg=colour64,bg=colour235,bold'
set -g @tp_window_name_style 'fg=colour252,bg=colour236'
# tmux default の bell/activity style は "reverse" なので無効化する
set -g window-status-bell-style default
set -g window-status-activity-style default

# tmux-powerline handles status bar configuration

########################################
# Config
########################################

set -g default-terminal "tmux-256color"
if -F '#{>=:#{version},3.2}' 'set -as terminal-features ",*:RGB"' 'set -ga terminal-overrides ",xterm-256color:Tc"'
set -s set-clipboard external

# 環境変数の設定
set-environment -g LANG "en_US.UTF-8"
set-environment -g LC_ALL "en_US.UTF-8"
set -ga update-environment "PATH"

set -g base-index 1

set -g history-limit 10000

set -g renumber-windows on

# Disable automatic window renaming
set -g automatic-rename off
set -g allow-rename off
set -g set-titles off

# ref: https://zenn.dev/tanktabox/scraps/235a05b5d5fa97
set -s escape-time 50
set -g focus-events on
if -F '#{>=:#{version},3.2}' 'set -g extended-keys on'

# Alerts / Notifications
# bell は current/other を問わず扱い、activity/silence は無効化する
set -g bell-action any
set -gq activity-action none
set -gq silence-action none
setw -g monitor-bell on

# 画面反転は無効化し、BELは端末へ通してローカル通知を優先する
set -g visual-bell off
set -g visual-activity off
set -gq visual-silence off

# activity/silence監視は無効化
setw -g monitor-activity off
setw -g monitor-silence 0



# Pane borders (Solarized Dark with enhanced visibility)
set -g pane-border-style "fg=colour238,bg=colour235"
set -g pane-active-border-style "fg=colour33,bg=colour234,bold"
set -g pane-border-lines heavy

# Pane dimming for inactive panes
# 非アクティブペイン: 文字色を明るく調整して視認性向上
set -g window-style 'fg=colour250,bg=colour234'
# アクティブペイン: 文字色をより明るく、背景は透過
set -g window-active-style 'fg=colour255,bg=terminal'


# Message style
set -g message-style "bg=colour235,fg=colour166"
set -g message-command-style "bg=colour235,fg=colour33"

# Mode style (selection)
set -g mode-style "bg=colour235,fg=colour136"

# Clock
set -g clock-mode-colour colour64

########################################
# Key bindings
########################################

set -g prefix C-q
bind C-q send-prefix
unbind C-b

# Claude Codeでの改行問題対策
# Option 1: Alt+Enterで改行（Claude Codeの標準）
# Option 2: Ctrl+Jで改行（Unix標準）
# Option 3: Claude Code内で /terminal-setup を実行してShift+Enterを有効化
# Enterはそのまま（Claude Codeが決定として処理）

bind r source-file ${HOME}/.tmux.conf \; display-message ".tmux.conf reloaded"

bind m choose-tree

bind c new-window -c "#{pane_current_path}"

bind s split-window -vc "#{pane_current_path}"
bind v split-window -hc "#{pane_current_path}"

bind -r n next-window
bind -r b previous-window

# ウィンドウの順序を入れ替え
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r < resize-pane -L 2
bind -r - resize-pane -D 2
bind -r + resize-pane -U 2
bind -r > resize-pane -R 2

bind -r H resize-pane -L 8
bind -r J resize-pane -D 8
bind -r K resize-pane -U 8
bind -r L resize-pane -R 8

bind q kill-pane
bind Q kill-window

# Quick window switching with number keys
# base-index=1のため0は10に割り当て
bind 0 select-window -t :10
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# Quick switch to last window
bind ` last-window

# Show window list
bind w choose-window

set -g mode-keys vi

bind V copy-mode
unbind -T copy-mode-vi Space

bind -T copy-mode-vi g send-keys -X top-line
bind -T copy-mode-vi G send-keys -X bottom-line
bind -T copy-mode-vi w send-keys -X next-word
bind -T copy-mode-vi e send-keys -X next-word-end
bind -T copy-mode-vi b send-keys -X previous-word
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line

bind -T copy-mode-vi K send-keys -N 10 -X cursor-up
bind -T copy-mode-vi J send-keys -N 10 -X cursor-down

# クリップボードコピー（OSC52フォールバック付き）
# bin/copy-to-clipboard: pbcopy > xclip > wl-copy > OSC52
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "copy-to-clipboard"

########################################
# TPM (Tmux Plugin Manager)
########################################

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'erikw/tmux-powerline'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-resurrect / continuum
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Pane management hooks
# Remember last active pane for each window
set-hook -g pane-focus-out 'set -w @last_active_pane "#{pane_id}"'
set-hook -g after-select-window 'run-shell "#{?XDG_CONFIG_HOME,#{q:XDG_CONFIG_HOME},#{q:HOME}/.config}/zsh/functions/tmux-after-select-window \"#{@last_active_pane}\" \"#{hook_session}\" \"#{hook_client}\""'
set-hook -g after-kill-pane 'run-shell "#{?XDG_CONFIG_HOME,#{q:XDG_CONFIG_HOME},#{q:HOME}/.config}/zsh/functions/tmux-git-window-name-refresh \"#{window_id}\" \"#{hook_session}\" \"#{hook_client}\""'
set-hook -g pane-exited 'run-shell "#{?XDG_CONFIG_HOME,#{q:XDG_CONFIG_HOME},#{q:HOME}/.config}/zsh/functions/tmux-git-window-name-refresh \"#{window_id}\" \"#{hook_session}\" \"#{hook_client}\""'
set-hook -g alert-bell 'run-shell "command -v tmux-alert-notify >/dev/null 2>&1 && tmux-alert-notify bell #{q:session_name} #{q:window_index} #{q:window_name} #{q:pane_index} #{q:pane_title} #{q:pane_current_path} #{q:pane_current_command} #{q:window_flags} || true"'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
